<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promotions — Pharmacie</title>
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vert:        #1a8a5a;
      --vert-fonce:  #0f5e3a;
      --vert-clair:  #e8f5ee;
      --vert-mid:    #c5e4d3;
      --blanc:       #ffffff;
      --gris-fond:   #f4f8f5;
      --gris-bord:   #d8ece2;
      --texte:       #1a2b22;
      --texte-2:     #5a7367;
      --rouge-promo: #e03e3e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gris-fond);
      color: var(--texte);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: linear-gradient(145deg, var(--vert-fonce) 0%, var(--vert) 100%);
      color: var(--blanc);
      padding: 2rem 1.25rem 1.75rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -30px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .header-inner { position: relative; z-index: 1; }

    .croix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 26px;
    }

    header h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    header .adresse {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 14px;
    }

    .badge-maj {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-maj::before { content: '🕐'; font-size: 12px; }

    /* ─── Horaires ─── */
    .horaires-strip {
      background: var(--vert-fonce);
      color: rgba(255,255,255,0.85);
      text-align: center;
      font-size: 12.5px;
      padding: 8px 1rem;
      letter-spacing: 0.02em;
    }

    /* ─── Contenu principal ─── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* ─── Titre section ─── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--vert);
      margin-bottom: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--vert-mid);
    }

    /* ─── Grille de cartes ─── */
    .promo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (max-width: 420px) {
      .promo-grid { grid-template-columns: 1fr; }
    }

    /* ─── Carte promo ─── */
    .card {
      background: var(--blanc);
      border: 1px solid var(--gris-bord);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26,138,90,0.12);
    }

    /* Image produit */
    .card-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: var(--vert-clair);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--vert);
    }
    .card-img-placeholder span { font-size: 11px; opacity: 0.6; }
    .card-img-placeholder svg { opacity: 0.35; }

    /* Badge réduction */
    .badge-remise {
      position: absolute;
      top: 9px;
      right: 9px;
      background: var(--rouge-promo);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 6px rgba(224,62,62,0.35);
    }

    /* Corps de la carte */
    .card-body {
      padding: 0.85rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-cat {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--vert);
      background: var(--vert-clair);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      align-self: flex-start;
      margin-bottom: 2px;
    }

    .card-nom {
      font-size: 14px;
      font-weight: 700;
      color: var(--texte);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 12px;
      color: var(--texte-2);
      line-height: 1.4;
      flex: 1;
    }

    .card-prix {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: 8px;
    }

    .prix-promo {
      font-size: 20px;
      font-weight: 800;
      color: var(--vert);
      line-height: 1;
    }
    .prix-ancien {
      font-size: 11px;
      color: var(--texte-2);
      text-decoration: line-through;
      margin-top: 2px;
    }

    .card-expiry {
      font-size: 11px;
      color: var(--texte-2);
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-expiry::before { content: '📅'; font-size: 11px; }

    /* ─── États de chargement / erreur / vide ─── */
    .etat {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--texte-2);
    }
    .etat .icon { font-size: 40px; margin-bottom: 10px; }
    .etat p { font-size: 14px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--vert-mid);
      border-top-color: var(--vert);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ─── */
    footer {
      background: var(--blanc);
      border-top: 1px solid var(--gris-bord);
      text-align: center;
      padding: 1.25rem 1rem;
      font-size: 12px;
      color: var(--texte-2);
      line-height: 1.8;
    }
    footer strong { color: var(--texte); }

    /* ─── Mention légale ─── */
    .mention {
      text-align: center;
      font-size: 11px;
      color: var(--texte-2);
      opacity: 0.6;
      padding: 0.75rem 1rem 1.5rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="croix">✚</div>
      <h1 id="nom-pharmacie">Pharmacie</h1>
      <p class="adresse" id="adresse-pharmacie">Chargement…</p>
      <span class="badge-maj" id="badge-date">Mise à jour en cours…</span>
    </div>
  </header>

  <div class="horaires-strip" id="horaires-strip">
    Lun – Sam &nbsp;|&nbsp; 8h30 – 19h30
  </div>

  <main>
    <div class="section-label">Promotions en cours</div>
    <div class="promo-grid" id="promo-grid">
      <div class="etat">
        <div class="spinner"></div>
        <p>Chargement des promotions…</p>
      </div>
    </div>
  </main>

  <footer>
    <p id="footer-tel"></p>
    <p>Les prix s'entendent TTC. Offres valables dans la limite des stocks disponibles.</p>
  </footer>
  <p class="mention">Page générée automatiquement depuis Google Sheets</p>

<script>
// ════════════════════════════════════════════════
//  CONFIGURATION — modifiez ici si besoin
// ════════════════════════════════════════════════
const CONFIG = {
  // Votre URL Google Sheets (CSV public)
  sheetURL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWSimqPdKEUc2PWlHNK13ftd243rw5pAyn6pmndMksUAAUSAtbl6Lq3lkzymvUJssZxmEG69OUm7WL/pub?gid=0&single=true&output=csv",

  // Informations de votre pharmacie (à personnaliser)
  nomPharmacie:  "Pharmacie du Centre",
  adresse:       "12 rue de la Paix — Épinal",
  telephone:     "03 29 XX XX XX",
  horaires:      "Lun – Sam  |  8h30 – 19h30",
};
// ════════════════════════════════════════════════

// Remplissage des infos statiques
document.getElementById("nom-pharmacie").textContent    = CONFIG.nomPharmacie;
document.getElementById("adresse-pharmacie").textContent = CONFIG.adresse;
document.getElementById("horaires-strip").textContent   = CONFIG.horaires;
if (CONFIG.telephone) {
  document.getElementById("footer-tel").innerHTML =
    `📞 <strong>${CONFIG.telephone}</strong>`;
}

// Date de mise à jour
const maintenant = new Date();
const dateStr = maintenant.toLocaleDateString("fr-FR", {
  day: "numeric", month: "long", year: "numeric"
});
document.getElementById("badge-date").textContent = `Mis à jour le ${dateStr}`;

// ── Parsing CSV simple (gère les guillemets) ──
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];

  const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());

  return lines.slice(1)
    .map(line => {
      const values = splitCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (values[i] || "").trim(); });
      return obj;
    })
    .filter(row => row.nom && row.nom.length > 0); // ignore lignes vides
}

function splitCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      inQuotes = !inQuotes;
    } else if (c === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += c;
    }
  }
  result.push(current);
  return result;
}

// ── Calcul du % de réduction ──
function calcRemise(prixPromo, prixAncien) {
  const p = parseFloat(String(prixPromo).replace(",", "."));
  const a = parseFloat(String(prixAncien).replace(",", "."));
  if (!p || !a || a <= p) return null;
  return Math.round((1 - p / a) * 100);
}

// ── Formatage prix ──
function formatPrix(val) {
  const n = parseFloat(String(val).replace(",", "."));
  if (isNaN(n)) return val;
  return n.toFixed(2).replace(".", ",") + " €";
}

// ── Conversion lien Google Drive → lien direct ──
function driveLienDirect(url) {
  if (!url) return null;
  // Format : https://drive.google.com/file/d/FILE_ID/view?...
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  // Format déjà direct ou autre URL
  return url;
}

// ── Construction d'une carte ──
function construireCarteHTML(promo) {
  const remise = calcRemise(promo.prix_promo, promo.prix_ancien);
  const lienPhoto = driveLienDirect(promo.photo);

  // Bloc image
  let imgHTML;
  if (lienPhoto) {
    imgHTML = `
      <div class="card-img">
        <img
          src="${lienPhoto}"
          alt="${promo.nom}"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        />
        <div class="card-img-placeholder" style="display:none;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Photo produit</span>
        </div>
        ${remise ? `<span class="badge-remise">-${remise}%</span>` : ""}
      </div>`;
  } else {
    imgHTML = `
      <div class="card-img">
        <div class="card-img-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Photo à venir</span>
        </div>
        ${remise ? `<span class="badge-remise">-${remise}%</span>` : ""}
      </div>`;
  }

  // Bloc prix
  let prixHTML = "";
  if (promo.prix_promo) {
    prixHTML = `
      <div class="card-prix">
        <div>
          <div class="prix-promo">${formatPrix(promo.prix_promo)}</div>
          ${promo.prix_ancien ? `<div class="prix-ancien">${formatPrix(promo.prix_ancien)}</div>` : ""}
        </div>
      </div>`;
  }

  // Date de fin
  let expiryHTML = promo.date_fin
    ? `<div class="card-expiry">Jusqu'au ${promo.date_fin}</div>`
    : "";

  return `
    <div class="card">
      ${imgHTML}
      <div class="card-body">
        ${promo.categorie ? `<span class="card-cat">${promo.categorie}</span>` : ""}
        <div class="card-nom">${promo.nom}</div>
        ${promo.description ? `<div class="card-desc">${promo.description}</div>` : ""}
        ${prixHTML}
        ${expiryHTML}
      </div>
    </div>`;
}

// ── Chargement & affichage ──
async function chargerPromos() {
  const grid = document.getElementById("promo-grid");

  try {
    // Contournement CORS via un proxy public (pour GitHub Pages)
    // Paramètre anti-cache : force le navigateur à recharger les données à chaque visite
    const urlAntiCache = CONFIG.sheetURL + "&t=" + Date.now();
    const proxyURL = `https://corsproxy.io/?${encodeURIComponent(urlAntiCache)}`;
    const response = await fetch(proxyURL);

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();
    const promos = parseCSV(text);

    if (promos.length === 0) {
      grid.innerHTML = `
        <div class="etat">
          <div class="icon">🛒</div>
          <p>Aucune promotion en cours.<br>Revenez bientôt !</p>
        </div>`;
      return;
    }

    grid.innerHTML = promos.map(construireCarteHTML).join("");

  } catch (err) {
    console.error("Erreur chargement promos :", err);
    grid.innerHTML = `
      <div class="etat">
        <div class="icon">⚠️</div>
        <p>Impossible de charger les promotions.<br>Vérifiez votre connexion et réessayez.</p>
      </div>`;
  }
}

// Lancement
chargerPromos();
</script>
</body>
</html>
